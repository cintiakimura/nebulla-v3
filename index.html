<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kyn IDE - Project Workspace</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      // Aggressively silence Vite WebSocket/HMR errors in AI Studio
      (function() {
        const isViteError = (msg) => 
          msg && (
            msg.includes('WebSocket') || 
            msg.includes('vite') ||
            msg.includes('hmr')
          );

        // 1. Monkey-patch WebSocket to block Vite HMR attempts
        const OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
          if (typeof url === 'string' && (url.includes('vite') || url.includes('hmr'))) {
            // Return a mock object that fails silently
            return {
              readyState: 3, // CLOSED
              close: function() {},
              send: function() {},
              addEventListener: function() {},
              removeEventListener: function() {},
              onopen: null,
              onclose: null,
              onerror: null,
              onmessage: null
            };
          }
          try {
            return new OriginalWebSocket(url, protocols);
          } catch (e) {
            return {}; // Fallback for invalid URLs
          }
        };
        window.WebSocket.prototype = OriginalWebSocket.prototype;

        // 2. Global rejection handler
        window.addEventListener('unhandledrejection', (event) => {
          const reason = event.reason;
          const msg = (reason && (reason.message || reason.stack || String(reason))) || '';
          if (isViteError(msg)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        // 3. Global error handler
        window.addEventListener('error', (event) => {
          const msg = event.message || '';
          if (isViteError(msg)) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        // 4. Silence console errors from Vite
        const originalConsoleError = console.error;
        console.error = function() {
          const args = Array.from(arguments);
          const msg = args.join(' ');
          if (isViteError(msg)) return;
          originalConsoleError.apply(console, arguments);
        };
      })();
    </script>
  </head>
  <body class="flex flex-col">
    <div id="root" class="w-full h-full flex flex-col"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
