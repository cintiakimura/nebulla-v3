# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Add the rest of your secrets in the Dashboard (names match `.env.example`: Supabase, Grok,
# Stripe, OAuth, etc.). Render maps service env vars to Docker build args and runtime env.
#
# `VITE_PUBLIC_SITE_URL`: set to your Render URL (e.g. https://nebulla-v3.onrender.com) or
# custom domain so OAuth redirect matches Supabase. Optional at first deploy (client falls
# back to `window.location.origin`). Redeploy after setting.
#
# Optional: attach a disk at `/app/conversation-logs` on a paid instance for log persistence.

services:
  - type: web
    name: nebulla-v3
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_PUBLIC_SITE_URL
        sync: false
